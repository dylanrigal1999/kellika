name: Terraform Environment

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      project_id:
        required: true
        type: string
      wif_provider:
        required: true
        type: string
      apply:
        required: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ inputs.project_id }}
          workload_identity_provider: ${{ inputs.wif_provider }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=kellika-${{ inputs.environment }}-tfstate" \
            -backend-config="prefix=terraform/state"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var-file=environments/${{ inputs.environment }}.tfvars -out=tfplan -no-color

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: terraform/tfplan

  apply:
    name: Apply
    needs: plan
    if: inputs.apply
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ inputs.project_id }}
          workload_identity_provider: ${{ inputs.wif_provider }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=kellika-${{ inputs.environment }}-tfstate" \
            -backend-config="prefix=terraform/state"

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}
          path: terraform

      - name: Terraform Apply
        run: terraform apply tfplan
